[mypy]
# Core options
python_version = 3.12
strict = False
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Plugins
plugins =
    pydantic.mypy

# Error reporting
pretty = True
show_column_numbers = True
show_error_codes = True
show_error_context = True

# Configuring warnings
implicit_optional = False
implicit_reexport = False

# Configuring error suppression
ignore_errors = False

# Configuring coverage
files =
    core/
    db/
    services/
    utils/
    src/
    admin/
    memory_agent_integration/

exclude =
    ^venv/
    ^tests/
    ^migrations/
    ^examples/
    ^benchmarks/

[[mypy.overrides]]
module = [
    "langchain.*",
    "langchain_community.*",
    "langchain_openai.*",
    "google.auth.*",
    "googleapiclient.*",
    "tenacity.*",
    "prometheus_client.*",
    "structlog.*"
]
ignore_missing_imports = True

[[mypy.overrides]]
module = "tests.*"
ignore_errors = True

[[mypy.overrides]]
module = "examples.*"
ignore_errors = True

# Pydantic config
[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
warn_untyped_fields = False
