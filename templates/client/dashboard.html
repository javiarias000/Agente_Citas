<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcadium Cliente</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f3f4f6;
        height: 100vh;
        display: flex;
      }
      .sidebar {
        width: 320px;
        background: white;
        border-right: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
      }
      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid #e5e7eb;
      }
      .sidebar-header h1 {
        font-size: 1.2rem;
        margin-bottom: 10px;
      }
      .search-box {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        margin-bottom: 10px;
      }
      .filters {
        display: flex;
        gap: 5px;
      }
      .filter-btn {
        flex: 1;
        padding: 6px;
        border: 1px solid #d1d5db;
        background: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.75rem;
      }
      .filter-btn.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }
      .conversations {
        flex: 1;
        overflow-y: auto;
      }
      .conv-item {
        padding: 15px 20px;
        border-bottom: 1px solid #f3f4f6;
        cursor: pointer;
        transition: background 0.2s;
      }
      .conv-item:hover {
        background: #f9fafb;
      }
      .conv-item.active {
        background: #eef2ff;
        border-left: 3px solid #667eea;
      }
      .conv-name {
        font-weight: 600;
        color: #111827;
        margin-bottom: 4px;
      }
      .conv-preview {
        font-size: 0.875rem;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .conv-meta {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 0.75rem;
        color: #9ca3af;
      }
      .badge {
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .badge-green {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-red {
        background: #fee2e2;
        color: #991b1b;
      }
      .main-chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: white;
      }
      .chat-header {
        padding: 15px 20px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .chat-header-info h2 {
        font-size: 1rem;
        margin-bottom: 4px;
      }
      .chat-header-info p {
        font-size: 0.875rem;
        color: #6b7280;
      }
      .chat-controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .toggle-switch {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.875rem;
      }
      .toggle {
        width: 44px;
        height: 24px;
        background: #d1d5db;
        border-radius: 12px;
        position: relative;
        cursor: pointer;
        transition: background 0.3s;
      }
      .toggle.on {
        background: #10b981;
      }
      .toggle::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: left 0.3s;
      }
      .toggle.on::after {
        left: 22px;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f9fafb;
      }
      .message {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .message.user {
        flex-direction: row-reverse;
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        flex-shrink: 0;
      }
      .avatar.user {
        background: #10b981;
      }
      .avatar.assistant {
        background: #667eea;
      }
      .message-content {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.5;
      }
      .message.user .message-content {
        background: #10b981;
        color: white;
        border-bottom-right-radius: 4px;
      }
      .message.assistant .message-content {
        background: white;
        border: 1px solid #e5e7eb;
        color: #374151;
        border-bottom-left-radius: 4px;
      }
      .tools-used {
        margin-top: 8px;
        padding: 8px 12px;
        background: #fef3c7;
        border-radius: 8px;
        font-size: 0.875rem;
        border-left: 3px solid #f59e0b;
      }
      .chat-input {
        padding: 20px;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 10px;
      }
      .chat-input input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #d1d5db;
        border-radius: 24px;
        font-size: 1rem;
        outline: none;
      }
      .chat-input input:focus {
        border-color: #667eea;
      }
      .send-btn {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        background: #667eea;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .send-btn:hover {
        background: #5a67d8;
      }
      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        width: fit-content;
      }
      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }
      .info-panel {
        width: 280px;
        background: white;
        border-left: 1px solid #e5e7eb;
        padding: 20px;
        overflow-y: auto;
      }
      .info-card {
        background: #f9fafb;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
      }
      .info-card h4 {
        font-size: 0.9rem;
        margin-bottom: 10px;
        color: #374151;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.875rem;
        margin-bottom: 6px;
      }
      .info-label {
        color: #6b7280;
      }
      .info-value {
        font-weight: 600;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar: Lista de conversaciones -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>💬 Arcadium Cliente</h1>
        <input
          type="text"
          class="search-box"
          placeholder="🔍 Buscar conversación..."
        />
        <div class="filters">
          <button class="filter-btn active">Todas</button>
          <button class="filter-btn">Activas</button>
          <button class="filter-btn">Archivadas</button>
        </div>
      </div>
      <div class="conversations" id="conversationsList">
        <!-- Conversaciones cargadas dinámicamente -->
        <div style="padding: 20px; text-align: center; color: #6b7280">
          Cargando...
        </div>
      </div>
    </div>

    <!-- Chat principal -->
    <div class="main-chat">
      <div class="chat-header">
        <div class="chat-header-info">
          <h2 id="chatClientName">Selecciona una conversación</h2>
          <p id="chatClientPhone">—</p>
        </div>
        <div class="chat-controls">
          <div class="toggle-switch">
            <span>Agente</span>
            <div class="toggle" id="agentToggle" onclick="toggleAgent()"></div>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="messagesContainer">
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
          "
        >
          Selecciona una conversación para comenzar
        </div>
      </div>

      <div class="chat-input" id="inputContainer" style="display: none">
        <input
          type="text"
          id="messageInput"
          placeholder="Escribe tu mensaje..."
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMessage()">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Panel lateral derecho: Info del cliente -->
    <div class="info-panel">
      <div class="info-card">
        <h4>📊 Estadísticas</h4>
        <div class="info-row">
          <span class="info-label">Mensajes</span>
          <span class="info-value" id="statMessages">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Citas</span>
          <span class="info-value" id="statAppointments">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Estado</span>
          <span class="info-value" id="statStatus">—</span>
        </div>
      </div>

      <div class="info-card">
        <h4>⚙️ Configuración</h4>
        <div class="info-row">
          <span class="info-label">Agente</span>
          <span class="info-value" id="configAgentEnabled">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Proyecto</span>
          <span class="info-value" id="configProject">Default</span>
        </div>
      </div>

      <div class="info-card">
        <h4>🔧 Herramientas Usadas</h4>
        <div id="toolsUsed">—</div>
      </div>
    </div>

    <script>
      // Estado global
      let currentConversation = null;
      let ws = null;
      let agentsEnabled = {};

      // Inicializar
      document.addEventListener("DOMContentLoaded", () => {
        loadConversations();
      });

      // Cargar lista de conversaciones
      async function loadConversations() {
        try {
          const res = await fetch("/api/projects/default/conversations");
          if (!res.ok) throw new Error("Failed");
          const data = await res.json();
          renderConversations(data.conversations);
        } catch (e) {
          console.error("Error loading conversations:", e);
        }
      }

      // Renderizar lista
      function renderConversations(convs) {
        const list = document.getElementById("conversationsList");
        list.innerHTML = convs
          .map(
            (conv) => `
                <div class="conv-item" onclick="selectConversation('${conv.id}', '${conv.phone_number}')">
                    <div class="conv-name">+${conv.phone_number}</div>
                    <div class="conv-preview">${conv.last_message || "Sin mensajes"}</div>
                    <div class="conv-meta">
                        <span>${new Date(conv.updated_at).toLocaleTimeString()}</span>
                        <span class="badge ${conv.agent_enabled ? "badge-green" : "badge-red"}">
                            ${conv.agent_enabled ? "Activo" : "Pausado"}
                        </span>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // Seleccionar conversación
      async function selectConversation(convId, phone) {
        currentConversation = convId;
        document.getElementById("chatClientName").textContent = `+${phone}`;
        document.getElementById("chatClientPhone").textContent =
          `Tel: +${phone}`;
        document.getElementById("inputContainer").style.display = "flex";

        // Cargar historial
        await loadHistory(convId);
        // Conectar WebSocket
        connectWebSocket(convId);
        // Cargar estadísticas
        await loadConversationStats(convId);
      }

      // Cargar historial
      async function loadHistory(convId) {
        const res = await fetch(`/api/conversations/${convId}/messages`);
        if (res.ok) {
          const data = await res.json();
          renderMessages(data.messages);
        }
      }

      // Renderizar mensajes
      function renderMessages(messages) {
        const container = document.getElementById("messagesContainer");
        container.innerHTML = messages
          .map(
            (msg) => `
                <div class="message ${msg.direction}">
                    <div class="avatar ${msg.direction}">${msg.direction === "user" ? "C" : "AI"}</div>
                    <div class="message-content">
                        <div>${msg.content}</div>
                        ${
                          msg.tool_calls
                            ? `
                            <div class="tools-used">
                                <strong>🔧 Herramientas:</strong>
                                ${msg.tool_calls.map((t) => t.tool).join(", ")}
                            </div>
                        `
                            : ""
                        }
                        <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                    </div>
                </div>
            `,
          )
          .join("");
        container.scrollTop = container.scrollHeight;
      }

      // Conectar WebSocket
      function connectWebSocket(convId) {
        if (ws) ws.close();
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(
          `${protocol}//${window.location.host}/ws/${convId}?X-Project-Id=default`,
        );

        ws.onopen = () => console.log("WS connected");
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.type === "response") {
            addMessageToChat("assistant", data.content, data.tool_calls);
          }
        };
        ws.onclose = () => setTimeout(() => connectWebSocket(convId), 3000);
      }

      // Enviar mensaje
      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const msg = input.value.trim();
        if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;

        addMessageToChat("user", msg);
        input.value = "";

        ws.send(JSON.stringify({ message: msg }));
      }

      // Añadir mensaje al chat
      function addMessageToChat(type, content, toolCalls = []) {
        const container = document.getElementById("messagesContainer");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${type}`;
        msgDiv.innerHTML = `
                <div class="avatar ${type}">${type === "user" ? "C" : "AI"}</div>
                <div class="message-content">
                    <div>${content}</div>
                    ${
                      toolCalls.length
                        ? `
                        <div class="tools-used">
                            <strong>🔧 Herramientas:</strong>
                            ${toolCalls.map((t) => t.tool).join(", ")}
                        </div>
                    `
                        : ""
                    }
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
      }

      // Toggle agente
      async function toggleAgent() {
        if (!currentConversation) return;
        const toggle = document.getElementById("agentToggle");
        const newState = !toggle.classList.contains("on");

        // Llamar API para cambiar estado
        await fetch(`/api/conversations/${currentConversation}/agent-toggle`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: newState }),
        });

        toggle.classList.toggle("on", newState);
      }

      // Cargar estadísticas de conversación
      async function loadConversationStats(convId) {
        const res = await fetch(`/api/conversations/${convId}/stats`);
        if (res.ok) {
          const data = await res.json();
          document.getElementById("statMessages").textContent =
            data.message_count;
          document.getElementById("statAppointments").textContent =
            data.appointment_count;
          document.getElementById("statStatus").textContent = data.status;
        }
      }
    </script>
  </body>
</html>
