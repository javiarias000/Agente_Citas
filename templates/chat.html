<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcadium Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .chat-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 800px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-header h1 {
        font-size: 1.2rem;
        font-weight: 600;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
        animation: pulse 2s infinite;
      }

      .status-indicator.disconnected {
        background: #ef4444;
        animation: none;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f9fafb;
      }

      .message {
        margin-bottom: 16px;
        display: flex;
        gap: 10px;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
      }

      .avatar.user {
        background: #10b981;
      }

      .avatar.assistant {
        background: #667eea;
      }

      .message-content {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.5;
        position: relative;
      }

      .message.user .message-content {
        background: #10b981;
        color: white;
        border-bottom-right-radius: 4px;
      }

      .message.assistant .message-content {
        background: white;
        border: 1px solid #e5e7eb;
        color: #374151;
        border-bottom-left-radius: 4px;
      }

      .message-time {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 4px;
      }

      .message.user .message-time {
        text-align: right;
        color: #d1fae5;
      }

      .tools-used {
        margin-top: 8px;
        padding: 8px 12px;
        background: #fef3c7;
        border-radius: 8px;
        font-size: 0.875rem;
        border-left: 3px solid #f59e0b;
      }

      .tools-used h4 {
        font-size: 0.75rem;
        color: #92400e;
        margin-bottom: 4px;
        font-weight: 600;
      }

      .tool-item {
        color: #78350f;
        margin: 2px 0;
      }

      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
        width: fit-content;
        margin-bottom: 16px;
      }

      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      .input-container {
        padding: 20px;
        background: white;
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 10px;
      }

      .message-input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #d1d5db;
        border-radius: 24px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      .message-input:focus {
        border-color: #667eea;
      }

      .send-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .send-button:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .send-icon {
        width: 20px;
        height: 20px;
      }

      .error-message {
        background: #fee2e2;
        color: #991b1b;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 16px;
      }

      .connection-status {
        padding: 8px 16px;
        background: #f3f4f6;
        font-size: 0.875rem;
        color: #6b7280;
        text-align: center;
        border-top: 1px solid #e5e7eb;
      }

      .connection-status.connected {
        color: #059669;
        background: #d1fae5;
      }

      .connection-status.disconnected {
        color: #dc2626;
        background: #fee2e2;
      }

      /* Scrollbar styling */
      .messages-container::-webkit-scrollbar {
        width: 6px;
      }

      .messages-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .messages-container::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      .messages-container::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="status-indicator" id="statusIndicator"></div>
        <h1>🤖 Arcadium Assistant</h1>
      </div>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="input-container">
        <input
          type="text"
          class="message-input"
          id="messageInput"
          placeholder="Escribe tu mensaje..."
          autocomplete="off"
        />
        <button class="send-button" id="sendButton">
          <svg
            class="send-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
          </svg>
        </button>
      </div>

      <div class="connection-status disconnected" id="connectionStatus">
        Desconectado
      </div>
    </div>

    <script src="/static/chat.js"></script>
  </body>
</html>
